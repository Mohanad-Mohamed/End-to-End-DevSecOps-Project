public/assets/styles.css
---

:root {
  color-scheme: dark;
  --bg: #070912;
  --panel: rgba(12, 18, 34, 0.72);
  --panel-strong: rgba(15, 23, 42, 0.92);
  --text: #f7fbff;
  --muted: #b6c3d7;
  --line: rgba(255, 255, 255, 0.14);
  --accent: #37e6a2;
  --accent-2: #61a6ff;
  --accent-3: #ffbe4d;
  font-family:
    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  min-height: 100vh;
  margin: 0;
  background:
    radial-gradient(circle at 15% 10%, rgba(55, 230, 162, 0.2), transparent 28rem),
    radial-gradient(circle at 85% 20%, rgba(97, 166, 255, 0.24), transparent 30rem),
    linear-gradient(135deg, #070912, #0d1022 45%, #101827);
  color: var(--text);
  overflow-x: hidden;
}

body::before {
  position: fixed;
  inset: -35%;
  z-index: -1;
  content: "";
  background:
    conic-gradient(from 120deg, rgba(55, 230, 162, 0.16), transparent, rgba(255, 190, 77, 0.15), transparent, rgba(97, 166, 255, 0.18)),
    linear-gradient(90deg, rgba(255, 255, 255, 0.04), transparent);
  animation: gradient-drift 16s ease-in-out infinite alternate;
  filter: blur(32px);
}

a {
  color: inherit;
  text-decoration: none;
}

code {
  color: var(--accent);
}

.page-shell {
  width: min(1180px, calc(100% - 32px));
  margin: 0 auto;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 78px;
  gap: 24px;
}

.brand,
.nav-links {
  display: flex;
  align-items: center;
}

.brand {
  gap: 12px;
  font-weight: 800;
}

.brand-mark {
  display: grid;
  width: 42px;
  height: 42px;
  place-items: center;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: linear-gradient(135deg, rgba(55, 230, 162, 0.32), rgba(97, 166, 255, 0.16));
}

.hero {
  display: grid;
  grid-template-columns: minmax(0, 1.04fr) minmax(320px, 0.96fr);
  gap: 42px;
  align-items: center;
  min-height: calc(100vh - 78px);
  padding: 44px 0 86px;
}

.eyebrow {
  margin: 0 0 12px;
  color: var(--accent);
  font-size: 0.78rem;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

h1,
p {
  margin-top: 0;
}

h1 {
  max-width: 760px;
  margin-bottom: 24px;
  font-size: clamp(3.3rem, 10vw, 7.4rem);
  line-height: 0.9;
}

.hero-text {
  color: var(--muted);
  line-height: 1.7;
}

.hero-text {
  max-width: 670px;
  font-size: 1.18rem;
}

.devops-panel,
.tool-cloud span {
  background: var(--panel);
  backdrop-filter: blur(18px);
}

.devops-panel {
  display: grid;
  gap: 26px;
  min-width: 0;
  padding: 34px;
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
}

.devops-icon {
  display: grid;
  place-items: center;
  min-height: 210px;
}

.devops-icon svg {
  width: min(100%, 360px);
  overflow: visible;
}

.devops-icon svg path {
  fill: none;
  stroke: var(--accent);
  stroke-width: 13;
  stroke-linecap: round;
  filter: drop-shadow(0 0 20px rgba(55, 230, 162, 0.42));
  stroke-dasharray: 22 10;
  animation: dash-flow 4s linear infinite;
}

.tool-cloud {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.tool-cloud span {
  padding: 9px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.06);
  color: var(--muted);
  font-weight: 800;
}

.project-meta {
  display: grid;
  max-width: 620px;
  margin-top: 26px;
  border-top: 1px solid var(--line);
}

.project-meta p {
  display: grid;
  grid-template-columns: 150px 1fr;
  gap: 16px;
  margin: 0;
  padding: 14px 0;
  border-bottom: 1px solid var(--line);
}

.project-meta span {
  color: var(--muted);
}

.project-meta strong {
  color: var(--text);
}


@keyframes gradient-drift {
  0% {
    transform: rotate(0deg) scale(1);
  }

  100% {
    transform: rotate(24deg) scale(1.14);
  }
}

@keyframes dash-flow {
  to {
    stroke-dashoffset: -64;
  }
}

@media (max-width: 880px) {
  .nav-links {
    display: none;
  }

  .hero {
    grid-template-columns: 1fr;
  }

  .hero {
    min-height: auto;
    padding-top: 38px;
  }
}

@media (max-width: 560px) {
  .page-shell {
    width: min(100% - 22px, 1180px);
  }

  .project-meta p {
    grid-template-columns: 1fr;
    gap: 4px;
  }
}

