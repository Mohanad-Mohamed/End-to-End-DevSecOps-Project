

.gitlab-ci.yml
---

stages:
  - test
  - quality
  - build

variables:
  IMAGE_NAME: "$DOCKERHUB_USERNAME/end-to-end-devsecops-project:$CI_PIPELINE_IID"

unit_tests:
  stage: test
  image: node:20-alpine
  script:
    - npm test


sonarqube_scan:
  stage: quality
  image: 
    name: sonarsource/sonar-scanner-cli:11
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar" 
    GIT_DEPTH: "0"  
  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - "${SONAR_USER_HOME}/cache"
      - sonar-scanner/
  script: 
    - sonar-scanner -Dsonar.host.url="${SONAR_HOST_URL}"
  allow_failure: true

build_and_push_image:
  stage: build
  image: docker:26
  services:
    - docker:26-dind
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  script:
    - docker build -t "$IMAGE_NAME" .
    - docker push "$IMAGE_NAME"
    - docker images
  needs:
    - sonarqube_scan

---

