

deployment.yaml

File:
k8s/app/deployment.yaml

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: end-to-end-devops-project
  namespace: devops-project
  labels:
    app: end-to-end-devops-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: end-to-end-devops-project
  template:
    metadata:
      labels:
        app: end-to-end-devops-project
    spec:
      containers:
        - name: website
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

---

