


Update= ".gitlab-ci.yml"
---
stages:
  - test
  - quality
  - build
  - security
  - deploy

variables:
  IMAGE_NAME: "$DOCKERHUB_USERNAME/end-to-end-devops-project:$CI_PIPELINE_IID"

unit_tests:
  stage: test
  image: node:20-alpine
  script:
    - npm test

sonarqube_scan:
  stage: quality
  image: 
    name: sonarsource/sonar-scanner-cli:11
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar" 
    GIT_DEPTH: "0"  
  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - "${SONAR_USER_HOME}/cache"
      - sonar-scanner/
  script: 
    - sonar-scanner -Dsonar.host.url="${SONAR_HOST_URL}"
  allow_failure: true

build_and_push_image:
  stage: build
  image: docker:26
  services:
    - docker:26-dind
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  script:
    - docker build -t "$IMAGE_NAME" .
    - docker push "$IMAGE_NAME"
    - docker images
  needs:
    - sonarqube_scan

trivy_image_scan:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL "$IMAGE_NAME"
  needs:
    - build_and_push_image

deploy_to_eks:
  stage: deploy
  image:
    name: alpine/k8s:1.35.0
    entrypoint: [""]
  environment:
    name: production
  before_script:
    - aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"
  script:
    - sed -i "s|IMAGE_PLACEHOLDER|$IMAGE_NAME|g" k8s/app/deployment.yaml
    - kubectl apply -f k8s/app/
    - kubectl apply -f k8s/monitoring/prometheus-rule.yaml
    - kubectl apply -f k8s/monitoring/alertmanager-config.yaml
    - kubectl -n devops-project rollout status deployment/end-to-end-devops-project
  needs:
    - trivy_image_scan

---



